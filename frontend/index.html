<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h2>Notes</h2>
        </header>

        <main>
            <div class="note-input-container">
                <input type="text" id="noteTitle" placeholder="Judul" required>
                <textarea id="noteDesc" placeholder="Tulis catatanmu disini..." rows="3" required></textarea>
                <div class="input-actions">
                    <button id="saveBtn"><i class="fas fa-plus"></i> Add Note</button>
                </div>
            </div>

            <div class="archives-header">
                <h3>Recent Archives</h3>
            </div>

            <div id="notesContainer" class="notes-grid">
                </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
